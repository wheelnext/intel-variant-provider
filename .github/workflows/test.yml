name: test

on: [push, pull_request]

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4
    - name: 'Set up Python ${{ matrix.python-version }}'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: 'Install variantlib'
      run: |
        # aligning version if variantlib with the one used in this project:
        # * https://github.com/wheelnext/pep_xxx_wheel_variants
        python3 -m pip install git+https://github.com/wheelnext/variantlib@8a65f31
    - name: 'Install project'
      run: |
        python3 --version
        python3 -m pip install -e .
        python3 -m pip install -e ".[test]"
    - name: 'Run pytest'
      run: |
        python3 -m pytest tests/
